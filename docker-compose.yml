services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: biblehaus
      POSTGRES_USER: biblehaus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biblehaus_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "./docker-entrypoint.sh"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://biblehaus:${POSTGRES_PASSWORD:-biblehaus_dev}@db:5432/biblehaus
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ADMIN_SEED_EMAIL=${ADMIN_SEED_EMAIL:-}
      - ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD:-}
      - TTS_ENABLED=${TTS_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TTS_VOICE=${TTS_VOICE:-nova}
      - TTS_CACHE_DIR=/app/.cache/tts
    volumes:
      - tts_cache:/app/.cache/tts
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  tts_cache:
