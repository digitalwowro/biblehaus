services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: biblehaus
      POSTGRES_USER: biblehaus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    image: ${WEB_IMAGE:-ghcr.io/digitalwowro/biblehaus:latest}
    pull_policy: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://biblehaus:${POSTGRES_PASSWORD}@db:5432/biblehaus
      - TTS_CACHE_DIR=/app/.cache/tts
    volumes:
      - tts_cache:/app/.cache/tts
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  tts_cache:
