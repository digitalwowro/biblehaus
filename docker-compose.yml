services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: biblehaus
      POSTGRES_USER: biblehaus
      POSTGRES_PASSWORD: biblehaus
    volumes:
      - ./sql:/var/lib/postgresql/data
    networks:
      - biblehaus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblehaus -d biblehaus"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    image: ghcr.io/digitalwowro/biblehaus:latest
    pull_policy: always
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://biblehaus:biblehaus@db:5432/biblehaus
    volumes:
      - ./tts:/app/.cache/tts
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - biblehaus
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  biblehaus:
    internal: true

