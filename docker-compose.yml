services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: biblehaus
      POSTGRES_USER: biblehaus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./sql:/var/lib/postgresql/data
    networks:
      - internal

  web:
    image: ghcr.io/digitalwowro/biblehaus:latest
    pull_policy: always
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://biblehaus:${POSTGRES_PASSWORD}@db:5432/biblehaus
    volumes:
      - ./tts:/app/.cache/tts
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    internal: true

